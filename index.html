<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#1976d2,#42a5f5);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
    padding:40px 30px;
    text-align:center;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#1976d2;
    color:#fff;
    font-size:40px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

.error-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ffebee;
    color:#e53935;
    font-size:48px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

h1{
    margin-top:22px;
    color:#222;
}

p{
    margin-top:12px;
    color:#666;
    line-height:1.6;
}

.loader{
    display:none;
    margin:25px auto;
    width:52px;
    height:52px;
    border:5px solid #e5e5e5;
    border-top:5px solid #1976d2;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

button{
    width:100%;
    margin-top:30px;
    border:none;
    padding:16px;
    border-radius:14px;
    background:#1976d2;
    color:#fff;
    font-size:18px;
    cursor:pointer;
}

button:disabled{
    background:#90caf9;
    cursor:not-allowed;
}

#error{
    display:none;
}

@keyframes spin{
    to{transform:rotate(360deg);}
}
</style>

</head>

<body>

<div class="card">

<div id="main">

<div class="logo">🏥</div>

<h1>EMR</h1>

<p>
Nhấn nút bên dưới để kết nối hệ thống EMR.
</p>

<div class="loader" id="loader"></div>

<button id="btnConnect" onclick="connectEMR()">
🔗 Kết nối EMR
</button>

</div>

<div id="error">

<div class="error-icon">📶</div>

<h1>Không kết nối được</h1>

<p>
Không tìm thấy máy chủ EMR.<br><br>
Vui lòng kết nối <b>WiFi nội bộ bệnh viện</b> rồi thử lại.
</p>

<button onclick="location.reload()">
🔄 Thử lại
</button>

</div>

</div>

<script>

function connectEMR(){

    const btn=document.getElementById("btnConnect");
    const loader=document.getElementById("loader");

    btn.disabled=true;
    btn.innerHTML="Đang kết nối...";
    loader.style.display="block";

    // Thử WiFi 100
    window.location.href="http://172.16.100.254/emr";

    // Sau 1.5 giây thử WiFi 140
    setTimeout(function(){

        if(document.visibilityState==="visible"){
            window.location.href="http://172.16.140.254/emr";
        }

    },1500);

    // Sau 3 giây báo lỗi
    setTimeout(function(){

        if(document.visibilityState==="visible"){

            document.getElementById("main").style.display="none";
            document.getElementById("error").style.display="block";

        }

    },3000);

}

</script>

</body>
</html>
