<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#1976d2,#42a5f5);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
    padding:40px 30px;
    text-align:center;
    animation:show .4s ease;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#1976d2;
    color:#fff;
    font-size:42px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

.error-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ffebee;
    color:#e53935;
    font-size:48px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

h1{
    margin-top:20px;
    font-size:28px;
    color:#222;
}

p{
    margin-top:12px;
    color:#666;
    font-size:17px;
    line-height:1.6;
}

.loader{
    margin:28px auto;
    width:52px;
    height:52px;
    border:5px solid #e5e5e5;
    border-top:5px solid #1976d2;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

button{
    width:100%;
    margin-top:28px;
    border:none;
    background:#1976d2;
    color:#fff;
    font-size:18px;
    padding:16px;
    border-radius:14px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#1565c0;
}

button:active{
    transform:scale(.98);
}

#ready,#error{
    display:none;
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>

</head>
<body>

<div class="card">

    <!-- Loading -->
    <div id="loading">

        <div class="logo">🏥</div>

        <h1>Đang kiểm tra kết nối</h1>

        <p id="status">
            Đang tìm máy chủ EMR...
        </p>

        <div class="loader"></div>

    </div>

    <!-- Ready -->
    <div id="ready">

        <div class="logo">🏥</div>

        <h1>Sẵn sàng</h1>

        <p id="serverName">
            Đã tìm thấy máy chủ.
        </p>

        <button id="connectBtn">
            🚀 Kết nối EMR
        </button>

    </div>

    <!-- Error -->
    <div id="error">

        <div class="error-icon">📶</div>

        <h1>Không kết nối được</h1>

        <p>
            Không tìm thấy máy chủ EMR.<br><br>
            Vui lòng kết nối WiFi nội bộ bệnh viện.
        </p>

        <button onclick="checkServer()">
            🔄 Kiểm tra lại
        </button>

    </div>

</div>

<script>

let serverUrl = "";

function resetUI(){

    loading.style.display="block";
    ready.style.display="none";
    error.style.display="none";

}

function showReady(url,name){

    serverUrl=url;

    loading.style.display="none";
    ready.style.display="block";

    serverName.innerHTML="Đã kết nối tới <b>"+name+"</b>";

}

function showError(){

    loading.style.display="none";
    error.style.display="block";

}

connectBtn.onclick=function(){

    location.href=serverUrl;

};

function checkOne(url,name,next){

    status.innerHTML="Đang kiểm tra "+name+"...";

    let img=new Image();

    let done=false;

    let timer=setTimeout(function(){

        if(done) return;

        done=true;

        next();

    },1200);

    img.onload=function(){

        if(done) return;

        done=true;

        clearTimeout(timer);

        showReady(url,name);

    };

    img.onerror=function(){

        if(done) return;

        done=true;

        clearTimeout(timer);

        next();

    };

    img.src=url+"/favicon.ico?"+Date.now();

}

function checkServer(){

    resetUI();

    checkOne(
        "http://172.16.100.254/emr",
        "EMR - WiFi 100",

        function(){

            checkOne(

                "http://172.16.140.254/emr",
                "EMR - WiFi 140",

                function(){

                    showError();

                }

            );

        }

    );

}

checkServer();

</script>

</body>
</html>
