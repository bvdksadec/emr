
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#1976d2,#42a5f5);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.card{
    width:90%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
    padding:40px 30px;
    text-align:center;
    animation:show .4s ease;
}

.logo{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#1976d2;
    color:#fff;
    font-size:40px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

h1{
    margin-top:22px;
    font-size:28px;
    color:#222;
}

p{
    margin-top:12px;
    font-size:17px;
    color:#666;
    line-height:1.6;
}

.loader{
    margin:28px auto 0;
    width:52px;
    height:52px;
    border:5px solid #e5e5e5;
    border-top:5px solid #1976d2;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

#error{
    display:none;
}

.error-icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#ffebee;
    color:#e53935;
    font-size:48px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
}

button{
    margin-top:30px;
    width:100%;
    border:none;
    background:#1976d2;
    color:#fff;
    font-size:18px;
    padding:16px;
    border-radius:14px;
    cursor:pointer;
    transition:.2s;
}

button:active{
    transform:scale(.98);
}

@keyframes spin{
    to{
        transform:rotate(360deg);
    }
}

@keyframes show{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="card">

    <div id="loading">

        <div class="logo">🏥</div>

        <h1>Đang kết nối EMR</h1>

        <p>
            Hệ thống đang tự động tìm máy chủ phù hợp...
        </p>

        <div class="loader"></div>

    </div>

    <div id="error">

        <div class="error-icon">📶</div>

        <h1>Không kết nối được</h1>

        <p>
            Không tìm thấy máy chủ EMR.<br><br>
            Vui lòng kết nối <b>WiFi nội bộ bệnh viện</b> rồi thử lại.
        </p>

        <button onclick="location.reload()">
            🔄 Thử lại
        </button>

    </div>

</div>

<script>

// Thử WiFi A
window.location.href="http://172.16.100.254/emr";

// Sau 1.5 giây thử WiFi B
setTimeout(()=>{
    if(document.visibilityState==="visible"){
        window.location.href="http://172.16.140.254/emr";
    }
},1500);

// Sau 3 giây hiện lỗi
setTimeout(()=>{
    if(document.visibilityState==="visible"){
        document.getElementById("loading").style.display="none";
        document.getElementById("error").style.display="block";
    }
},3000);

</script>

</body>
</html>
