<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#1976d2,#42a5f5);
    display:flex;
    justify-content:center;
    align-items:center;
}

.card{
    width:92%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    padding:35px 30px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,.18);
}

.icon{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#1976d2;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
    font-size:42px;
}

h2{
    margin-top:22px;
    color:#222;
}

p{
    margin-top:12px;
    color:#666;
    line-height:1.6;
    font-size:16px;
}

.loader{
    width:54px;
    height:54px;
    margin:28px auto;
    border:5px solid #eee;
    border-top:5px solid #1976d2;
    border-radius:50%;
    animation:spin .8s linear infinite;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    background:#1976d2;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    margin-top:25px;
}

button:hover{
    background:#1565c0;
}

.success{
    background:#43a047;
}

.success:hover{
    background:#2e7d32;
}

.error{
    background:#e53935;
}

.error:hover{
    background:#c62828;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

.hidden{
    display:none;
}
</style>

</head>
<body>

<div class="card">

<div id="loading">

<div class="icon">🏥</div>

<h2>Đang kiểm tra kết nối</h2>

<p>Hệ thống đang tìm máy chủ EMR...</p>

<div class="loader"></div>

</div>

<div id="success" class="hidden">

<div class="icon" style="background:#43a047;">✔</div>

<h2>Kết nối thành công</h2>

<p>
Đã tìm thấy máy chủ EMR.<br>
Nhấn nút bên dưới để mở hệ thống.
</p>

<button class="success" onclick="openEMR()">
Kết nối EMR
</button>

</div>

<div id="error" class="hidden">

<div class="icon" style="background:#e53935;">📶</div>

<h2>Không tìm thấy máy chủ</h2>

<p>
Vui lòng kết nối WiFi nội bộ bệnh viện rồi thử lại.
</p>

<button class="error" onclick="location.reload()">
Thử lại
</button>

</div>

</div>

<script>

let emrUrl = "";

async function check(url){

    try{

        const controller = new AbortController();

        const timeout = setTimeout(()=>controller.abort(),1200);

        const res = await fetch(url+"/config.json",{
            cache:"no-store",
            signal:controller.signal
        });

        clearTimeout(timeout);

        if(res.ok){
            emrUrl=url;
            showSuccess();
            return true;
        }

    }catch(e){}

    return false;
}

function showSuccess(){

    loading.classList.add("hidden");
    success.classList.remove("hidden");

}

function showError(){

    loading.classList.add("hidden");
    error.classList.remove("hidden");

}

function openEMR(){

    location.href=emrUrl;

}

(async()=>{

    if(await check("http://172.16.100.254/emr")) return;

    if(await check("http://172.16.140.254/emr")) return;

    showError();

})();

</script>

</body>
</html>
