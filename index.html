<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>EMR</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI,Roboto,Arial,sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#1565c0,#42a5f5);
}

.card{
    width:95%;
    max-width:430px;
    background:#fff;
    border-radius:24px;
    padding:35px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.18);
}

.logo{
    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:#1976d2;
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:42px;
}

h1{
    margin-top:20px;
    color:#222;
    font-size:28px;
}

#status{
    margin-top:15px;
    color:#666;
    line-height:1.7;
    font-size:16px;
}

.loader{
    width:55px;
    height:55px;
    border:5px solid #ddd;
    border-top:5px solid #1976d2;
    border-radius:50%;
    margin:28px auto;
    animation:spin .8s linear infinite;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#1976d2;
    color:#fff;
    font-size:18px;
    cursor:pointer;
    display:none;
}

button:hover{
    background:#1565c0;
}

.success{
    color:#2e7d32;
    font-weight:bold;
}

.error{
    color:#d32f2f;
    font-weight:bold;
}

@keyframes spin{
to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="card">

<div class="logo">🏥</div>

<h1>EMR</h1>

<div class="loader" id="loader"></div>

<div id="status">
Đang kiểm tra kết nối...
</div>

<button id="connectBtn">
KẾT NỐI
</button>

</div>

<script>

const SERVERS=[
"http://172.16.100.254",
"http://172.16.140.254"
];

let currentServer="";

async function checkServer(server){

    try{

        const controller=new AbortController();

        const timeout=setTimeout(()=>{
            controller.abort();
        },1500);

        const res=await fetch(server+"/emr/config.json",{
            cache:"no-store",
            signal:controller.signal
        });

        clearTimeout(timeout);

        return res.ok;

    }catch(e){
        return false;
    }

}

async function start(){

    const status=document.getElementById("status");

    for(const server of SERVERS){

        status.innerHTML="Đang kiểm tra<br><b>"+server+"</b>";

        const ok=await checkServer(server);

        if(ok){

            currentServer=server;

            document.getElementById("loader").style.display="none";

            status.innerHTML=
            '<div class="success">✅ Đã tìm thấy máy chủ</div><br>'
            +server;

            const btn=document.getElementById("connectBtn");

            btn.style.display="block";

            btn.onclick=function(){
                location.href=currentServer+"/emr";
            };

            return;
        }

    }

    document.getElementById("loader").style.display="none";

    status.innerHTML=
    '<div class="error">❌ Không tìm thấy máy chủ EMR</div><br>'
    +'Vui lòng kết nối WiFi nội bộ rồi thử lại.';

    const btn=document.getElementById("connectBtn");

    btn.style.display="block";
    btn.innerHTML="THỬ LẠI";

    btn.onclick=function(){
        location.reload();
    };

}

start();

</script>

</body>
</html>
